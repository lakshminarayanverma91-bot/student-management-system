<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Cards</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-10">

  <h1 class="text-3xl font-bold text-center mb-10">Student Management</h1>

  <!-- Cards Container -->
  <div class="grid md:grid-cols-3 gap-8">

    {% for student in students_data %}

        <div class="bg-white shadow-lg rounded-xl p-6 text-center">
        <img src="{{ student.image.url }}" class="w-24 h-24 mx-auto rounded-full mb-4">

        <h2 class="text-xl font-semibold">{{ student.name }}</h2>
        <p class="text-gray-600">Email: {{ student.email }}</p>
        <p class="text-gray-600 mb-4">Phone: {{ student.phone_no }}</p>

        <div class="flex justify-center gap-2">
            <button class="bg-blue-500 text-white px-3 py-1 rounded hover:bg-blue-600">Update</button>
            <button class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">Delete</button>
        </div>
        </div>
    {% endfor %}

  </div>

  <!-- Create Button -->
  <div class="flex justify-center mt-12">
    <a href="/student/add-student/" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700">
      + Create Student
    </a>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Update Student</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-xl p-8 w-[420px]">

<h2 class="text-2xl font-semibold text-center mb-6">
Update Student
</h2>

<form method="POST">

{% csrf_token %}

<!-- Full Name -->
<div class="mb-4">
<label class="block text-sm font-medium text-gray-600 mb-1">
Full Name
</label>

<input
type="text"
name="input_name"
value="{{ student.name }}"
class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
/>

</div>

<!-- Email -->
<div class="mb-4">
<label class="block text-sm font-medium text-gray-600 mb-1">
Email Address
</label>

<input
type="email"
name="input_email"
value="{{ student.email }}"
class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
/>

</div>

<!-- Phone -->
<div class="mb-6">
<label class="block text-sm font-medium text-gray-600 mb-1">
Phone Number
</label>

<input
type="text"
name="input_phone"
value="{{ student.phone_no }}"
class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
/>

</div>

<!-- Buttons -->
<div class="flex items-center justify-between">

<a href="{% url 'student_home' %}" class="text-gray-600 hover:text-black">
← Back
</a>

<button
type="submit"
class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700"
>
Update Student
</button>

</div>

</form>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Student</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-md">

<h2 class="text-2xl font-bold text-center mb-6">Add New Student</h2>

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    <!-- Name -->
    <div class="mb-4">
        <label class="block text-gray-700 mb-2">Name</label>
        <input 
            type="text" 
            name="input_name"
            placeholder="Enter student name"
            class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
            required>
    </div>

    <!-- Email -->
    <div class="mb-4">
        <label class="block text-gray-700 mb-2">Email</label>
        <input type="email" name="input_email" placeholder="Enter email"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
        required>
    </div>

    <!-- Phone -->
    <div class="mb-4">
        <label class="block text-gray-700 mb-2">Phone Number</label>
        <input type="text" name="input_phone" placeholder="Enter Phone Number"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
        required>
    </div>

    <!-- Image -->
    <div class="mb-6">
        <label class="block text-gray-700 mb-2">Student Image</label>
        <input type="file" name="input_image"
        class="w-full border rounded-lg px-3 py-2 bg-white">
    </div>

    <!-- Buttons -->
    <div class="flex justify-between">

        <a href="{% url 'student_home' %}"
        class="bg-gray-400 text-white px-4 py-2 rounded-lg hover:bg-gray-500">
        Cancel
        </a>

        <button type="submit"
        class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700">
        Add Student
        </button>

    </div>

</form>

</div>

</body>
</html>
